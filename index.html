<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Serena Chinese</title>

  <script src="dictionary.js"></script>

  <style>
    /* =====================================================
       CSS: внешний вид приложения
       =====================================================

       CSS отвечает за красоту: цвета, размеры, отступы,
       карточки, кнопки, мобильную адаптацию и canvas.
    */

    /* ---------- Общие настройки страницы ---------- */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f0ff;
      color: #1f1633;
      text-align: center;
    }

    /* ---------- Основной контейнер приложения ---------- */

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 5px;
      font-size: 34px;
    }

    .subtitle {
      margin-top: 0;
      color: #6b5c83;
    }

    /* ---------- Панели и вкладки ---------- */

    .panel {
      background: white;
      border-radius: 22px;
      padding: 18px;
      margin: 16px 0;
      box-shadow: 0 8px 24px rgba(70, 45, 110, 0.12);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 16px 0;
    }

    /* ---------- Кнопки ---------- */

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: #7b4dff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    button.secondary {
      background: #e8ddff;
      color: #3c266d;
    }

    button.danger {
      background: #d94343;
    }

    button.success {
      background: #2f9e67;
    }

    button.warning {
      background: #d98c20;
    }

    button.active {
      background: #2e1b5f;
    }

    .mode {
      display: none;
    }

    .mode.active {
      display: block;
    }

    /* ---------- Статистика прогресса ---------- */

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 15px;
    }

    .stat-card {
      background: #f3edff;
      border-radius: 16px;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(70, 45, 110, 0.12);
    }

    .stat-number {
      font-size: 24px;
      font-weight: bold;
    }

    /* ---------- Карточки слов ---------- */

    .card {
      background: #faf7ff;
      border: 2px solid #e0d2ff;
      border-radius: 22px;
      padding: 22px;
      margin: 12px 0;
    }

    .chinese-big {
      font-size: 72px;
      margin: 10px 0;
    }

    .pinyin {
      font-size: 24px;
      color: #7b4dff;
      margin: 5px 0;
    }

    .meaning {
      font-size: 24px;
      margin: 5px 0;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 14px 0;
    }

    .lesson-words {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 12px 0;
    }

    .word-pill {
      background: #efe6ff;
      color: #3c266d;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 15px;
    }

    /* ---------- Блок письма иероглифов ---------- */

    .canvas-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin: 15px 0;
    }

    .character-box {
      background: #faf7ff;
      border-radius: 18px;
      padding: 10px;
    }

    .character-title {
      font-size: 28px;
      margin-bottom: 8px;
      color: #7b4dff;
    }

    canvas {
      width: 180px;
      height: 180px;
      border: 2px solid #7b4dff;
      border-radius: 16px;
      background: white;
      touch-action: none;
    }

    /* ---------- Блок построения предложений ---------- */



    /* Фразы в контексте: кликабельные слова внутри готового предложения */
    .phrase-card {
      background: #faf7ff;
      border: 2px solid #e0d2ff;
      border-radius: 22px;
      padding: 18px;
      margin: 12px 0;
    }

    .phrase-text {
      font-size: 34px;
      line-height: 1.7;
      margin: 12px 0;
    }

    .phrase-token {
      display: inline-block;
      padding: 6px 10px;
      margin: 4px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      border: 2px solid transparent;
    }

    .phrase-token.known {
      background: #e8ddff;
      color: #3c266d;
    }

    .phrase-token.new-word {
      background: #ffe6a7;
      color: #6b3b00;
      border-color: #d98c20;
    }

    .phrase-token.review-word {
      background: #ffd9c7;
      color: #6b2500;
      border-color: #d98c20;
    }

    .phrase-token:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .phrase-translation {
      font-size: 20px;
      color: #5a3fa0;
      margin: 8px 0;
    }

    .word-info-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: white;
      border: 2px solid #e0d2ff;
      text-align: center;
    }

    .sentence-bank,
    .sentence-answer {
      min-height: 55px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      margin: 10px 0;
      border-radius: 16px;
      background: #f3edff;
    }

    .sentence-answer {
      border: 2px dashed #7b4dff;
      background: #ffffff;
    }

    .message {
      min-height: 24px;
      color: #5a3fa0;
      font-weight: bold;
      margin: 12px 0;
    }

    .dictionary-warning {
      background: #fff4df;
      color: #8a4b00;
      border: 1px solid #f0c36d;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .dictionary-ok {
      background: #e9f8f0;
      color: #1f7a4d;
      border: 1px solid #86d3aa;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    /* ---------- Форма добавления слов ---------- */

    input, select {
      width: 100%;
      max-width: 400px;
      padding: 12px;
      margin: 7px 0;
      border: 1px solid #d6c7f5;
      border-radius: 12px;
      font-size: 16px;
    }

    /* ---------- Список словаря ---------- */

    .dictionary-list {
      text-align: left;
      max-height: 300px;
      overflow: auto;
      margin-top: 15px;
      padding: 10px;
      border-radius: 16px;
      background: #faf7ff;
    }

    .dictionary-item {
      padding: 12px 8px;
      border-bottom: 1px solid #e2d6fa;
    }

    .dictionary-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .dictionary-actions button,
    .filter-button {
      padding: 7px 10px;
      font-size: 13px;
      border-radius: 10px;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 12px 0;
    }

    .filter-button.active {
      background: #2e1b5f;
      color: white;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: #efe6ff;
      color: #3c266d;
      font-size: 13px;
      margin-left: 4px;
    }

    .small-note {
      color: #6b5c83;
      font-size: 14px;
    }

    /* ---------- Адаптация под телефон ---------- */

    @media (max-width: 700px) {
      .tabs {
        grid-template-columns: 1fr 1fr;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }

      .chinese-big {
        font-size: 60px;
      }

      button {
        width: 100%;
      }

      .button-row button {
        width: auto;
        flex: 1 1 140px;
      }
    }
  </style>
</head>

<body>
  <!-- =====================================================
       HTML: видимая структура приложения
       =====================================================

       Здесь находятся кнопки, вкладки и пустые контейнеры.
       JavaScript позже заполняет эти контейнеры карточками,
       canvas-досками, предложениями и словарём.
  -->
  <div class="app">
    <h1>Serena Chinese</h1>
    <p class="subtitle">Карточки → письмо иероглифов → предложения</p>

    <div class="panel">
      <div class="button-row">
        <button onclick="startNewLesson()">Новый урок: 10 слов</button>
        <button class="secondary" onclick="continueLesson()">Продолжить урок</button>
        <button class="danger" onclick="resetProgress()">Сбросить прогресс</button>
      </div>

      <div id="lessonInfo" class="small-note"></div>

      <div class="stats">
        <div class="stat-card" onclick="openDictionaryStatus('new')" title="Открыть новые слова">
          <div class="stat-number" id="newCount">0</div>
          <div>новые</div>
        </div>
        <div class="stat-card" onclick="openDictionaryStatus('learning')" title="Открыть слова в изучении">
          <div class="stat-number" id="learningCount">0</div>
          <div>изучаются</div>
        </div>
        <div class="stat-card" onclick="openDictionaryStatus('review')" title="Открыть слова на повторение">
          <div class="stat-number" id="reviewCount">0</div>
          <div>повторить</div>
        </div>
        <div class="stat-card" onclick="openDictionaryStatus('learned')" title="Открыть выученные слова">
          <div class="stat-number" id="learnedCount">0</div>
          <div>выучены</div>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button id="tabCards" class="active" onclick="showMode('cards')">Учить слова</button>
      <button id="tabWriting" onclick="showMode('writing')">Писать иероглифы</button>
      <button id="tabSentences" onclick="showMode('sentences')">Строить предложения</button>
      <button id="tabDictionary" onclick="showMode('dictionary')">Словарь</button>
    </div>

    <div id="cardsMode" class="mode active panel">
      <h2>1. Учим слова</h2>
      <div id="cardBox"></div>
    </div>

    <div id="writingMode" class="mode panel">
      <h2>2. Пишем иероглифы</h2>
      <div id="writingBox"></div>
    </div>

    <div id="sentencesMode" class="mode panel">
      <h2>3. Строим предложения</h2>
      <div id="sentenceBox"></div>
    </div>

    <div id="dictionaryMode" class="mode panel">
      <h2>Словарь</h2>
      <p class="small-note">
        Главный базовый словарь теперь живёт в файле dictionary.js. Здесь можно добавить личное слово только в память этого браузера.
      </p>

      <input id="newChinese" placeholder="Иероглиф, например: 猫">
      <input id="newPinyin" placeholder="Пиньинь, например: māo">
      <input id="newMeaning" placeholder="Перевод, например: кошка">

      <select id="newType">
        <option value="noun">noun — существительное</option>
        <option value="verb">verb — глагол</option>
        <option value="pronoun">pronoun — местоимение</option>
        <option value="adjective">adjective — прилагательное</option>
        <option value="particle">particle — частица</option>
        <option value="phrase">phrase — фраза</option>
      </select>

      <div class="button-row">
        <button onclick="addCustomWord()">Добавить слово</button>
      </div>

      <div id="dictionaryMessage" class="message"></div>
      <div id="dictionaryList" class="dictionary-list"></div>
    </div>
  </div>

  <script>
    /* =====================================================
       JAVASCRIPT: логика приложения
       =====================================================

       JavaScript отвечает за поведение:
       - создаёт уроки;
       - показывает карточки;
       - сохраняет прогресс;
       - рисует canvas для иероглифов;
       - проверяет предложения;
       - проверяет dictionary.js на дубликаты.
    */

    // =====================================================
    // 1. STORAGE KEYS — ключи localStorage
    // =====================================================
    //
    // Эти строки называют “полки” в localStorage.
    // Если не менять эти имена, прогресс сохраняется даже
    // после обновления index.html.

    const PROGRESS_KEY = "serenaChineseProgressV2";
    const CUSTOM_WORDS_KEY = "serenaChineseCustomWordsV2";
    const LESSON_KEY = "serenaChineseCurrentLessonV2";

    // =====================================================
    // 2. DATA SOURCES — источники данных
    // =====================================================
    //
    // baseDictionary приходит из файла dictionary.js.
    // customWords — личные слова, добавленные через интерфейс
    // только в этом браузере.

    const baseDictionary = window.SERENA_DICTIONARY || [];

    // =====================================================
    // 3. APP STATE — текущее состояние приложения
    // =====================================================
    //
    // Эти переменные описывают, что сейчас происходит:
    // какая вкладка открыта, какой номер карточки, какой урок.

    let customWords = loadJSON(CUSTOM_WORDS_KEY, []);
    let progress = loadJSON(PROGRESS_KEY, {});
    let lesson = loadJSON(LESSON_KEY, null);

    let currentMode = "cards";
    let currentCardIndex = 0;
    let currentWritingIndex = 0;
    let currentSentenceIndex = 0;
    let cardAnswerVisible = false;
    let chosenSentenceWords = [];

    // Фильтр для экрана “Словарь”.
    // Он показывает: все слова, новые, изучаются, повторить или выученные.
    let currentDictionaryFilter = "all";

    // =====================================================
    // 4. PHRASE BANK — готовые фразы для контекстного обучения
    // =====================================================
    //
    // Это не просто “собери предложение”. Теперь каждая фраза
    // состоит из tokens — отдельных слов, связанных с dictionary.js.
    //
    // wordId — id слова из dictionary.js.
    // text — обычный знак или текст, который не нужно искать в словаре.
    // bank — слова-кнопки для сборки фразы.
    // translation — перевод всей фразы.
    // explanation — короткое грамматическое объяснение.

    const phraseBank = [
      {
        id: "p1",
        translation: "Я люблю пить чай.",
        tokens: [
          { wordId: "wo" },
          { wordId: "xihuan" },
          { wordId: "he" },
          { wordId: "cha" },
          { text: "。" }
        ],
        bank: ["茶", "我", "喜欢", "喝"],
        explanation: "我 = я, 喜欢 = нравится/любить, 喝 = пить, 茶 = чай."
      },
      {
        id: "p2",
        translation: "Ты хочешь пить воду?",
        tokens: [
          { wordId: "ni" },
          { wordId: "yao" },
          { wordId: "he" },
          { wordId: "shui" },
          { wordId: "ma" },
          { text: "？" }
        ],
        bank: ["水", "你", "吗", "要", "喝"],
        explanation: "吗 в конце делает предложение вопросом. 要 может значить “хотеть” или “нужно”."
      },
      {
        id: "p3",
        translation: "Он не ест рис / еду.",
        tokens: [
          { wordId: "ta_male" },
          { wordId: "bu" },
          { wordId: "chi" },
          { wordId: "fan" },
          { text: "。" }
        ],
        bank: ["吃", "他", "饭", "不"],
        explanation: "不 ставится перед глаголом: 不吃 = не есть."
      },
      {
        id: "p4",
        translation: "Сейчас я иду в школу.",
        tokens: [
          { wordId: "xianzai" },
          { wordId: "wo" },
          { wordId: "qu" },
          { wordId: "xuexiao" },
          { text: "。" }
        ],
        bank: ["学校", "现在", "去", "我"],
        explanation: "现在 можно поставить в начале: сейчас + кто + действие + место."
      },
      {
        id: "p5",
        translation: "Мама пьёт кофе.",
        tokens: [
          { wordId: "mama" },
          { wordId: "he" },
          { wordId: "kafei" },
          { text: "。" }
        ],
        bank: ["咖啡", "妈妈", "喝"],
        explanation: "Простой порядок: кто + действие + что."
      },
      {
        id: "p6",
        translation: "Учитель говорит очень медленно.",
        tokens: [
          { wordId: "laoshi" },
          { wordId: "shuo" },
          { wordId: "hen" },
          { wordId: "man" },
          { text: "。" }
        ],
        bank: ["慢", "老师", "很", "说"],
        explanation: "很 часто ставится перед прилагательным: 很慢 = очень медленно."
      },
      {
        id: "p7",
        translation: "Я хочу купить кофе.",
        tokens: [
          { wordId: "wo" },
          { wordId: "xiang" },
          { wordId: "mai_buy" },
          { wordId: "kafei" },
          { text: "。" }
        ],
        bank: ["咖啡", "买", "我", "想"],
        explanation: "想 + глагол = хотеть что-то сделать."
      },
      {
        id: "p8",
        translation: "Ты умеешь писать?",
        tokens: [
          { wordId: "ni" },
          { wordId: "hui_can" },
          { wordId: "xie" },
          { wordId: "ma" },
          { text: "？" }
        ],
        bank: ["写", "会", "吗", "你"],
        explanation: "会 + глагол часто значит “уметь что-то делать”."
      },
      {
        id: "p9",
        translation: "Мы все учимся / читаем.",
        tokens: [
          { wordId: "women" },
          { wordId: "dou" },
          { wordId: "du" },
          { text: "。" }
        ],
        bank: ["读", "都", "我们"],
        explanation: "都 означает “все”: 我们都 = мы все."
      },
      {
        id: "p10",
        translation: "Я возвращаюсь домой.",
        tokens: [
          { wordId: "wo" },
          { wordId: "hui_return" },
          { wordId: "jia" },
          { text: "。" }
        ],
        bank: ["家", "回", "我"],
        explanation: "回家 = возвращаться домой."
      }
    ];

    // =====================================================
    // 5. STORAGE FUNCTIONS — загрузка и сохранение
    // =====================================================
    //
    // Эти функции работают с localStorage.
    // localStorage хранит прогресс только в этом браузере.

    function loadJSON(key, fallback) {
      const text = localStorage.getItem(key);

      if (!text) {
        return fallback;
      }

      try {
        return JSON.parse(text);
      } catch (error) {
        return fallback;
      }
    }

    function saveJSON(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function saveProgress() {
      saveJSON(PROGRESS_KEY, progress);
    }

    function saveCustomWords() {
      saveJSON(CUSTOM_WORDS_KEY, customWords);
    }

    function saveLesson() {
      saveJSON(LESSON_KEY, lesson);
    }

    // =====================================================
    // 6. HELPER FUNCTIONS — маленькие помощники
    // =====================================================
    //
    // Вспомогательные функции:
    // - очищают текст;
    // - перемешивают массив;
    // - помогают другим частям кода работать проще.

    function normalizeChinese(text) {
      return String(text || "").trim().replace(/\s+/g, "");
    }

    function normalizeId(text) {
      return String(text || "").trim().toLowerCase();
    }

    // =====================================================
    // 7. DICTIONARY CHECKER — проверка dictionary.js
    // =====================================================
    //
    // Этот блок ищет проблемы в базовом словаре:
    // - повторяющиеся id;
    // - повторяющиеся китайские слова;
    // - пустые важные поля.
    //
    // Важно: этот блок НЕ удаляет слова из dictionary.js.
    // Он только предупреждает нас о проблемах.
    // Сам файл dictionary.js мы редактируем вручную в GitHub.

    function findDuplicates(dictionary, field, normalizer) {
      const seen = new Map();
      const duplicates = [];

      dictionary.forEach((word, index) => {
        const rawValue = word && word[field];
        const normalizedValue = normalizer(rawValue);

        if (!normalizedValue) {
          return;
        }

        if (seen.has(normalizedValue)) {
          const firstItem = seen.get(normalizedValue);

          duplicates.push({
            value: rawValue,
            normalizedValue,
            firstIndex: firstItem.index,
            duplicateIndex: index,
            firstWord: firstItem.word,
            duplicateWord: word
          });
        } else {
          seen.set(normalizedValue, {
            word,
            index
          });
        }
      });

      return duplicates;
    }

    function findDictionaryProblems() {
      const duplicateIds = findDuplicates(
        baseDictionary,
        "id",
        normalizeId
      );

      const duplicateChinese = findDuplicates(
        baseDictionary,
        "chinese",
        normalizeChinese
      );

      const missingFields = [];

      baseDictionary.forEach((word, index) => {
        ["id", "chinese", "pinyin", "meaning"].forEach(field => {
          const value = String((word && word[field]) || "").trim();

          if (!value) {
            missingFields.push({
              index,
              field,
              word
            });
          }
        });
      });

      return {
        duplicateIds,
        duplicateChinese,
        missingFields
      };
    }

    function renderDictionaryWarnings() {
      const problems = findDictionaryProblems();

      const hasNoProblems =
        problems.duplicateIds.length === 0 &&
        problems.duplicateChinese.length === 0 &&
        problems.missingFields.length === 0;

      if (hasNoProblems) {
        return `
          <div class="dictionary-ok">
            Словарь чистый: дубликаты и пустые поля не найдены.
          </div>
        `;
      }

      const duplicateIdText = problems.duplicateIds.length > 0
        ? problems.duplicateIds.map(item => {
            return `${item.normalizedValue} — слова №${item.firstIndex + 1} и №${item.duplicateIndex + 1}`;
          }).join("<br>")
        : "нет";

      const duplicateChineseText = problems.duplicateChinese.length > 0
        ? problems.duplicateChinese.map(item => {
            return `${item.normalizedValue} — слова №${item.firstIndex + 1} и №${item.duplicateIndex + 1}`;
          }).join("<br>")
        : "нет";

      const missingFieldsText = problems.missingFields.length > 0
        ? problems.missingFields.map(item => {
            return `слово №${item.index + 1}: нет поля ${item.field}`;
          }).join("<br>")
        : "нет";

      return `
        <div class="dictionary-warning">
          <strong>В dictionary.js есть проблемы.</strong><br><br>

          <strong>Повторяющиеся id:</strong><br>
          ${duplicateIdText}<br><br>

          <strong>Повторяющиеся китайские слова:</strong><br>
          ${duplicateChineseText}<br><br>

          <strong>Пустые поля:</strong><br>
          ${missingFieldsText}<br><br>

          <span class="small-note">
            Приложение продолжит работать и будет использовать только первые варианты дублей.
            Но лучше позже почистить dictionary.js вручную в GitHub.
          </span>
        </div>
      `;
    }

    function shuffle(array) {
      const copy = [...array];

      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }

      return copy;
    }

    // =====================================================
    // 8. WORD FUNCTIONS — работа со словами и прогрессом
    // =====================================================
    //
    // Эти функции соединяют dictionary.js, личные слова
    // и progress из localStorage.
    //
    // Важная защита: если в dictionary.js случайно есть дубли,
    // приложение берёт только первый вариант, чтобы уроки
    // не ломались и прогресс не путался.

    function getAllWords() {
      const all = [...baseDictionary, ...customWords];
      const seenChinese = new Set();
      const seenIds = new Set();
      const unique = [];

      all.forEach(word => {
        if (!word) {
          return;
        }

        const chineseKey = normalizeChinese(word.chinese);
        const idKey = normalizeId(word.id);

        if (!chineseKey || !idKey) {
          return;
        }

        if (seenChinese.has(chineseKey) || seenIds.has(idKey)) {
          return;
        }

        seenChinese.add(chineseKey);
        seenIds.add(idKey);
        unique.push(word);
      });

      return unique;
    }

    function getWordById(id) {
      return getAllWords().find(word => word.id === id);
    }

    function getProgress(wordId) {
      if (!progress[wordId]) {
        progress[wordId] = {
          status: "new",
          mastery: 0,
          cardDone: false,
          writingDone: false,
          sentenceDone: false,
          seenCount: 0,
          wrongCount: 0
        };
      }

      return progress[wordId];
    }

    function updateStatus(wordId) {
      const item = getProgress(wordId);

      if (item.mastery <= 0) {
        item.status = "new";
      } else if (item.mastery < 3) {
        item.status = "learning";
      } else if (item.mastery < 5) {
        item.status = "review";
      } else {
        item.status = "learned";
      }
    }


    // =====================================================
    // 8.1 PROGRESS MANAGER — ручное управление статусом слова
    // =====================================================
    //
    // Этот блок позволяет вручную перемещать слово между состояниями:
    // new, learning, review, learned.
    //
    // Это нужно, если приложение считает слово выученным,
    // но человек чувствует: “нет, я ещё плохо его знаю”.

    const STATUS_LABELS = {
      all: "все",
      new: "новые",
      learning: "изучаются",
      review: "повторить",
      learned: "выучены"
    };

    function getStatusLabel(status) {
      return STATUS_LABELS[status] || status;
    }

    function setWordStatus(wordId, newStatus) {
      const item = getProgress(wordId);

      if (newStatus === "new") {
        item.status = "new";
        item.mastery = 0;
        item.cardDone = false;
        item.writingDone = false;
        item.sentenceDone = false;
      }

      if (newStatus === "learning") {
        item.status = "learning";
        item.mastery = Math.max(1, item.mastery || 1);
        item.cardDone = true;
      }

      if (newStatus === "review") {
        item.status = "review";
        item.mastery = Math.max(3, item.mastery || 3);
        item.cardDone = true;
      }

      if (newStatus === "learned") {
        item.status = "learned";
        item.mastery = 5;
        item.cardDone = true;
        item.writingDone = true;
        item.sentenceDone = true;
      }

      saveProgress();
      renderAll();
    }

    function openDictionaryStatus(status) {
      currentDictionaryFilter = status;
      showMode("dictionary");
    }

    function setDictionaryFilter(status) {
      currentDictionaryFilter = status;
      renderDictionary();
    }

    function getFilteredDictionaryWords(words) {
      if (currentDictionaryFilter === "all") {
        return words;
      }

      return words.filter(word => {
        const item = getProgress(word.id);
        return item.status === currentDictionaryFilter;
      });
    }

    // =====================================================
    // 9. LESSON FUNCTIONS — логика урока
    // =====================================================
    //
    // Урок — это выбранная партия слов.
    // Сейчас приложение выбирает до 10 слов, которые ещё
    // не имеют статус learned.

    function startNewLesson() {
      const allWords = getAllWords();

      const newWords = allWords.filter(word => {
        const item = getProgress(word.id);
        return item.status !== "learned";
      });

      const selected = shuffle(newWords).slice(0, 10);

      if (selected.length === 0) {
        alert("Все слова уже выучены. Можно добавить новые слова в dictionary.js.");
        return;
      }

      lesson = {
        wordIds: selected.map(word => word.id),
        stage: "cards",
        createdAt: Date.now()
      };

      currentCardIndex = 0;
      currentWritingIndex = 0;
      currentSentenceIndex = 0;
      chosenSentenceWords = [];
      cardAnswerVisible = false;

      saveLesson();
      saveProgress();

      showMode("cards");
      renderAll();
    }

    function continueLesson() {
      if (!lesson || !lesson.wordIds || lesson.wordIds.length === 0) {
        startNewLesson();
        return;
      }

      renderAll();
    }

    function getLessonWords() {
      if (!lesson || !lesson.wordIds) {
        return [];
      }

      return lesson.wordIds
        .map(id => getWordById(id))
        .filter(Boolean);
    }

    // =====================================================
    // 10. NAVIGATION — переключение вкладок
    // =====================================================
    //
    // Эта функция показывает нужный экран:
    // cards, writing, sentences или dictionary.

    function showMode(mode) {
      currentMode = mode;

      document.querySelectorAll(".mode").forEach(section => {
        section.classList.remove("active");
      });

      document.querySelectorAll(".tabs button").forEach(button => {
        button.classList.remove("active");
      });

      document.getElementById(mode + "Mode").classList.add("active");

      if (mode === "cards") document.getElementById("tabCards").classList.add("active");
      if (mode === "writing") document.getElementById("tabWriting").classList.add("active");
      if (mode === "sentences") document.getElementById("tabSentences").classList.add("active");
      if (mode === "dictionary") document.getElementById("tabDictionary").classList.add("active");

      renderAll();
    }

    // =====================================================
    // 11. MAIN RENDER — общее обновление экрана
    // =====================================================
    //
    // renderAll() перерисовывает все важные части приложения.
    // Мы вызываем её после изменений прогресса, урока или словаря.

    function renderAll() {
      renderStats();
      renderLessonInfo();
      renderCards();
      renderWriting();
      renderSentences();
      renderDictionary();
    }

    function renderStats() {
      const allWords = getAllWords();

      let newCount = 0;
      let learningCount = 0;
      let reviewCount = 0;
      let learnedCount = 0;

      allWords.forEach(word => {
        const item = getProgress(word.id);

        if (item.status === "new") newCount++;
        if (item.status === "learning") learningCount++;
        if (item.status === "review") reviewCount++;
        if (item.status === "learned") learnedCount++;
      });

      document.getElementById("newCount").textContent = newCount;
      document.getElementById("learningCount").textContent = learningCount;
      document.getElementById("reviewCount").textContent = reviewCount;
      document.getElementById("learnedCount").textContent = learnedCount;
    }

    function renderLessonInfo() {
      const box = document.getElementById("lessonInfo");
      const words = getLessonWords();

      if (words.length === 0) {
        box.textContent = "Урок ещё не создан. Нажми “Новый урок: 10 слов”.";
        return;
      }

      const names = words.map(word => word.chinese).join(" ");

      box.innerHTML = `
        Текущий урок: ${words.length} слов.
        <div class="lesson-words">
          ${words.map(word => `<span class="word-pill">${word.chinese} — ${word.meaning}</span>`).join("")}
        </div>
      `;
    }

    // =====================================================
    // 12. CARDS MODE — режим карточек
    // =====================================================
    //
    // Здесь пользователь смотрит слово, открывает ответ,
    // нажимает “Я знаю” или “Повторить”.

    function renderCards() {
      const box = document.getElementById("cardBox");
      const words = getLessonWords();

      if (words.length === 0) {
        box.innerHTML = `
          <p>Сначала создай урок из 10 слов.</p>
          <button onclick="startNewLesson()">Создать урок</button>
        `;
        return;
      }

      if (currentCardIndex >= words.length) {
        currentCardIndex = 0;
      }

      const word = words[currentCardIndex];
      const item = getProgress(word.id);

      box.innerHTML = `
        <p>Слово ${currentCardIndex + 1} из ${words.length}</p>

        <div class="card">
          <div class="chinese-big">${word.chinese}</div>

          ${
            cardAnswerVisible
              ? `<div class="pinyin">${word.pinyin}</div><div class="meaning">${word.meaning}</div>`
              : `<div class="small-note">Нажми “Показать ответ”</div>`
          }

          <p class="small-note">
            Статус: ${item.status}, уровень: ${item.mastery}/5
          </p>
        </div>

        <div class="button-row">
          <button onclick="showCardAnswer()">Показать ответ</button>
          <button class="success" onclick="markCardKnown()">Я знаю</button>
          <button class="warning" onclick="markCardRepeat()">Повторить</button>
          <button class="secondary" onclick="nextCard()">Следующее</button>
        </div>

        <div class="button-row">
          <button onclick="showMode('writing')">Перейти к письму</button>
        </div>
      `;
    }

    function showCardAnswer() {
      cardAnswerVisible = true;
      renderCards();
    }

    function nextCard() {
      const words = getLessonWords();

      if (words.length === 0) return;

      currentCardIndex = (currentCardIndex + 1) % words.length;
      cardAnswerVisible = false;
      renderCards();
    }

    function markCardKnown() {
      const words = getLessonWords();
      const word = words[currentCardIndex];

      if (!word) return;

      const item = getProgress(word.id);

      item.cardDone = true;
      item.seenCount++;
      item.mastery = Math.min(5, item.mastery + 1);

      updateStatus(word.id);
      saveProgress();

      nextCard();
      renderAll();
    }

    function markCardRepeat() {
      const words = getLessonWords();
      const word = words[currentCardIndex];

      if (!word) return;

      const item = getProgress(word.id);

      item.wrongCount++;
      item.seenCount++;
      item.mastery = Math.max(0, item.mastery - 1);
      item.status = "review";

      saveProgress();

      nextCard();
      renderAll();
    }

    // =====================================================
    // 13. WRITING MODE — режим письма иероглифов
    // =====================================================
    //
    // Здесь создаются canvas-доски.
    // Если слово состоит из двух иероглифов, создаются две доски.

    function renderWriting() {
      const box = document.getElementById("writingBox");
      const words = getLessonWords();

      if (words.length === 0) {
        box.innerHTML = `
          <p>Сначала создай урок.</p>
          <button onclick="startNewLesson()">Создать урок</button>
        `;
        return;
      }

      const availableWords = words.filter(word => {
        return getProgress(word.id).cardDone;
      });

      const writingWords = availableWords.length > 0 ? availableWords : words;

      if (currentWritingIndex >= writingWords.length) {
        currentWritingIndex = 0;
      }

      const word = writingWords[currentWritingIndex];

      box.innerHTML = `
        <p>Письмо: слово ${currentWritingIndex + 1} из ${writingWords.length}</p>

        <div class="card">
          <div class="chinese-big">${word.chinese}</div>
          <div class="pinyin">${word.pinyin}</div>
          <div class="meaning">${word.meaning}</div>
        </div>

        <div id="canvasArea" class="canvas-area"></div>

        <div class="button-row">
          <button class="secondary" onclick="clearCanvases()">Очистить</button>
          <button class="success" onclick="markWritingGood()">Я написала</button>
          <button class="warning" onclick="markWritingHard()">Сложно, повторить</button>
          <button onclick="nextWritingWord()">Следующее</button>
        </div>

        <div class="button-row">
          <button onclick="showMode('sentences')">Перейти к предложениям</button>
        </div>
      `;

      createCharacterCanvases(word.chinese);
    }

    function createCharacterCanvases(chineseText) {
      const area = document.getElementById("canvasArea");
      const characters = Array.from(chineseText);

      characters.forEach(character => {
        const wrapper = document.createElement("div");
        wrapper.className = "character-box";

        const title = document.createElement("div");
        title.className = "character-title";
        title.textContent = character;

        const canvas = document.createElement("canvas");
        canvas.width = 220;
        canvas.height = 220;

        wrapper.appendChild(title);
        wrapper.appendChild(canvas);
        area.appendChild(wrapper);

        setupCanvas(canvas);
      });
    }

    function setupCanvas(canvas) {
      const context = canvas.getContext("2d");

      context.lineWidth = 8;
      context.lineCap = "round";
      context.lineJoin = "round";
      context.strokeStyle = "#2e1b5f";

      let drawing = false;

      function getPoint(event) {
        const rect = canvas.getBoundingClientRect();

        return {
          x: (event.clientX - rect.left) * (canvas.width / rect.width),
          y: (event.clientY - rect.top) * (canvas.height / rect.height)
        };
      }

      canvas.addEventListener("pointerdown", event => {
        event.preventDefault();

        drawing = true;

        const point = getPoint(event);

        context.beginPath();
        context.moveTo(point.x, point.y);
      });

      canvas.addEventListener("pointermove", event => {
        if (!drawing) return;

        event.preventDefault();

        const point = getPoint(event);

        context.lineTo(point.x, point.y);
        context.stroke();
      });

      canvas.addEventListener("pointerup", () => {
        drawing = false;
      });

      canvas.addEventListener("pointerleave", () => {
        drawing = false;
      });
    }

    function clearCanvases() {
      document.querySelectorAll("canvas").forEach(canvas => {
        const context = canvas.getContext("2d");
        context.clearRect(0, 0, canvas.width, canvas.height);
      });
    }

    function nextWritingWord() {
      const words = getLessonWords();
      const availableWords = words.filter(word => getProgress(word.id).cardDone);
      const writingWords = availableWords.length > 0 ? availableWords : words;

      currentWritingIndex = (currentWritingIndex + 1) % writingWords.length;
      renderWriting();
    }

    function markWritingGood() {
      const words = getLessonWords();
      const availableWords = words.filter(word => getProgress(word.id).cardDone);
      const writingWords = availableWords.length > 0 ? availableWords : words;
      const word = writingWords[currentWritingIndex];

      if (!word) return;

      const item = getProgress(word.id);

      item.writingDone = true;
      item.mastery = Math.min(5, item.mastery + 1);

      updateStatus(word.id);
      saveProgress();

      nextWritingWord();
      renderAll();
    }

    function markWritingHard() {
      const words = getLessonWords();
      const availableWords = words.filter(word => getProgress(word.id).cardDone);
      const writingWords = availableWords.length > 0 ? availableWords : words;
      const word = writingWords[currentWritingIndex];

      if (!word) return;

      const item = getProgress(word.id);

      item.wrongCount++;
      item.mastery = Math.max(0, item.mastery - 1);
      item.status = "review";

      saveProgress();

      nextWritingWord();
      renderAll();
    }

    // =====================================================
    // 14. SENTENCES MODE — готовые фразы + сборка предложения
    // =====================================================
    //
    // Здесь пользователь видит готовую китайскую фразу.
    // Каждое слово в фразе кликабельное:
    // - знакомые слова спокойного цвета;
    // - новые слова выделены жёлтым;
    // - слова на повторение выделены тёплым оранжевым.
    //
    // По нажатию на слово приложение показывает карточку:
    // иероглиф, pinyin, перевод, type, status, mastery.
    // Потом пользователь собирает эту же фразу из кнопок.

    function getPhraseWordIds(phrase) {
      return phrase.tokens
        .filter(token => token.wordId)
        .map(token => token.wordId);
    }

    function getPhraseCorrectAnswer(phrase) {
      return phrase.tokens
        .filter(token => token.wordId)
        .map(token => {
          const word = getWordById(token.wordId);
          return word ? word.chinese : "";
        })
        .join("");
    }

    function getAvailableSentences() {
      return phraseBank.filter(phrase => {
        const wordIds = getPhraseWordIds(phrase);

        const existingWordIds = wordIds.filter(wordId => {
          return Boolean(getWordById(wordId));
        });

        if (existingWordIds.length !== wordIds.length) {
          return false;
        }

        const progressItems = existingWordIds.map(wordId => getProgress(wordId));

        const knownCount = progressItems.filter(item => {
          return item.status !== "new" || item.mastery > 0 || item.cardDone || item.writingDone;
        }).length;

        const newCount = progressItems.filter(item => {
          return item.status === "new" && item.mastery === 0 && !item.cardDone && !item.writingDone;
        }).length;

        // Главная логика:
        // фраза должна быть понятной, но обучающей.
        // Поэтому в ней должно быть хотя бы одно знакомое слово
        // и не слишком много новых слов.
        return knownCount >= 1 && newCount <= 2;
      });
    }

    function renderPhraseTokens(phrase) {
      return phrase.tokens.map(token => {
        if (token.text) {
          return `<span>${token.text}</span>`;
        }

        const word = getWordById(token.wordId);

        if (!word) {
          return `<span class="phrase-token review-word">?</span>`;
        }

        const item = getProgress(word.id);
        let statusClass = "known";

        if (item.status === "new" && item.mastery === 0 && !item.cardDone && !item.writingDone) {
          statusClass = "new-word";
        }

        if (item.status === "review") {
          statusClass = "review-word";
        }

        return `
          <span
            class="phrase-token ${statusClass}"
            onclick="showWordInfo('${word.id}')"
            title="${word.pinyin} — ${word.meaning}"
          >
            ${word.chinese}
          </span>
        `;
      }).join("");
    }

    function showWordInfo(wordId) {
      const word = getWordById(wordId);
      const box = document.getElementById("wordInfoBox");

      if (!word || !box) {
        return;
      }

      const item = getProgress(word.id);

      box.innerHTML = `
        <div class="word-info-box">
          <div class="chinese-big">${word.chinese}</div>
          <div class="pinyin">${word.pinyin}</div>
          <div class="meaning">${word.meaning}</div>
          <p class="small-note">
            type: <strong>${word.type}</strong><br>
            status: <strong>${item.status}</strong><br>
            mastery: <strong>${item.mastery}/5</strong>
          </p>
          <div class="button-row">
            <button class="secondary" onclick="moveWordToStatus('${word.id}', 'new')">В новые</button>
            <button class="secondary" onclick="moveWordToStatus('${word.id}', 'learning')">В изучение</button>
            <button class="warning" onclick="moveWordToStatus('${word.id}', 'review')">В повторение</button>
            <button class="success" onclick="moveWordToStatus('${word.id}', 'learned')">В выученные</button>
          </div>
        </div>
      `;
    }

    function renderSentences() {
      const box = document.getElementById("sentenceBox");
      const availableSentences = getAvailableSentences();

      if (availableSentences.length === 0) {
        box.innerHTML = `
          <p>Пока нет доступных фраз.</p>
          <p class="small-note">
            Сначала познакомься хотя бы с несколькими словами в карточках.
            Тогда здесь появятся фразы, где есть знакомые и новые слова.
          </p>
          <button onclick="showMode('cards')">Вернуться к словам</button>
        `;
        return;
      }

      if (currentSentenceIndex >= availableSentences.length) {
        currentSentenceIndex = 0;
      }

      const phrase = availableSentences[currentSentenceIndex];

      box.innerHTML = `
        <div class="phrase-card">
          <p class="small-note">Нажми на любое китайское слово, чтобы увидеть pinyin, перевод и тип слова.</p>
          <div class="phrase-text">
            ${renderPhraseTokens(phrase)}
          </div>
          <div class="phrase-translation">
            ${phrase.translation}
          </div>
          <p class="small-note">
            Жёлтые слова — новые. Оранжевые — на повторении. Сиреневые — уже знакомые.
          </p>
          <div id="wordInfoBox"></div>
        </div>

        <h3>Собери эту фразу</h3>

        <div class="sentence-answer" id="sentenceAnswer">
          ${
            chosenSentenceWords.length === 0
              ? "<span class='small-note'>Выбранные слова появятся здесь</span>"
              : chosenSentenceWords.map(word => `<span class="word-pill">${word}</span>`).join("")
          }
        </div>

        <div class="sentence-bank" id="sentenceBank"></div>

        <div class="button-row">
          <button class="success" onclick="checkSentence()">Проверить</button>
          <button class="secondary" onclick="clearSentence()">Очистить</button>
          <button onclick="nextSentence()">Следующая фраза</button>
        </div>

        <div id="sentenceMessage" class="message"></div>
      `;

      const bank = document.getElementById("sentenceBank");

      phrase.bank.forEach(word => {
        const button = document.createElement("button");
        button.className = "secondary";
        button.textContent = word;
        button.onclick = () => {
          chosenSentenceWords.push(word);
          renderSentences();
        };
        bank.appendChild(button);
      });
    }

    function checkSentence() {
      const availableSentences = getAvailableSentences();
      const phrase = availableSentences[currentSentenceIndex];

      if (!phrase) return;

      const userAnswer = chosenSentenceWords.join("");
      const correctAnswer = getPhraseCorrectAnswer(phrase);
      const message = document.getElementById("sentenceMessage");

      if (userAnswer === correctAnswer) {
        message.innerHTML = `Правильно. ${phrase.explanation}`;

        getPhraseWordIds(phrase).forEach(wordId => {
          const item = getProgress(wordId);
          item.sentenceDone = true;
          item.mastery = Math.min(5, item.mastery + 1);
          updateStatus(wordId);
        });

        saveProgress();
        renderStats();
      } else {
        message.innerHTML = `Пока неправильно. Правильный ответ: ${correctAnswer}. ${phrase.explanation}`;

        getPhraseWordIds(phrase).forEach(wordId => {
          const item = getProgress(wordId);
          item.wrongCount++;
          item.status = "review";
        });

        saveProgress();
        renderStats();
      }
    }

    function clearSentence() {
      chosenSentenceWords = [];
      renderSentences();
    }

    function nextSentence() {
      const availableSentences = getAvailableSentences();

      if (availableSentences.length === 0) return;

      currentSentenceIndex = (currentSentenceIndex + 1) % availableSentences.length;
      chosenSentenceWords = [];
      renderSentences();
    }

    // =====================================================
    // 15. DICTIONARY MODE — экран словаря
    // =====================================================
    //
    // Здесь можно добавить личное слово в localStorage.
    // Базовые слова нужно добавлять в dictionary.js через GitHub.

    function addCustomWord() {
      const chinese = document.getElementById("newChinese").value.trim();
      const pinyin = document.getElementById("newPinyin").value.trim();
      const meaning = document.getElementById("newMeaning").value.trim();
      const type = document.getElementById("newType").value;
      const message = document.getElementById("dictionaryMessage");

      if (!chinese || !pinyin || !meaning) {
        message.textContent = "Заполни иероглиф, пиньинь и перевод.";
        return;
      }

      const exists = getAllWords().some(word => {
        return normalizeChinese(word.chinese) === normalizeChinese(chinese);
      });

      if (exists) {
        message.textContent = "Это слово уже есть в словаре.";
        return;
      }

      const newWord = {
        id: "custom_" + Date.now(),
        chinese,
        pinyin,
        meaning,
        level: 1,
        type
      };

      customWords.push(newWord);
      saveCustomWords();

      document.getElementById("newChinese").value = "";
      document.getElementById("newPinyin").value = "";
      document.getElementById("newMeaning").value = "";

      message.textContent = "Слово добавлено в память этого браузера.";

      renderAll();
    }

    function renderDictionary() {
      const list = document.getElementById("dictionaryList");
      const allWords = getAllWords();
      const filteredWords = getFilteredDictionaryWords(allWords);

      const warningsHTML = renderDictionaryWarnings();
      const filtersHTML = renderDictionaryFilters(allWords);
      const wordsHTML = renderDictionaryWordList(filteredWords);

      list.innerHTML = warningsHTML + filtersHTML + wordsHTML;
    }

    function renderDictionaryFilters(allWords) {
      const filters = ["all", "new", "learning", "review", "learned"];

      const buttons = filters.map(status => {
        const count = status === "all"
          ? allWords.length
          : allWords.filter(word => getProgress(word.id).status === status).length;

        const activeClass = currentDictionaryFilter === status ? "active" : "secondary";

        return `
          <button class="filter-button ${activeClass}" onclick="setDictionaryFilter('${status}')">
            ${getStatusLabel(status)}: ${count}
          </button>
        `;
      }).join("");

      return `
        <div class="filter-row">
          ${buttons}
        </div>
        <p class="small-note">
          Сейчас показан раздел: <strong>${getStatusLabel(currentDictionaryFilter)}</strong>.
          Здесь можно вручную перемещать слова между блоками прогресса.
        </p>
      `;
    }

    function renderDictionaryWordList(words) {
      if (words.length === 0) {
        return `
          <div class="dictionary-item">
            В этом разделе пока нет слов.
          </div>
        `;
      }

      return words.map(word => {
        const item = getProgress(word.id);

        return `
          <div class="dictionary-item">
            <strong>${word.chinese}</strong>
            — ${word.pinyin}
            — ${word.meaning}
            <span class="status-badge">${getStatusLabel(item.status)}</span>
            <br>
            <span class="small-note">
              id: ${word.id},
              type: ${word.type},
              mastery: ${item.mastery}/5
            </span>

            <div class="dictionary-actions">
              <button class="secondary" onclick="setWordStatus('${word.id}', 'new')">В новые</button>
              <button class="secondary" onclick="setWordStatus('${word.id}', 'learning')">В изучение</button>
              <button class="warning" onclick="setWordStatus('${word.id}', 'review')">В повторение</button>
              <button class="success" onclick="setWordStatus('${word.id}', 'learned')">В выученные</button>
            </div>
          </div>
        `;
      }).join("");
    }

    // =====================================================
    // 16. RESET / START — сброс и запуск приложения
    // =====================================================
    //
    // resetProgress() очищает localStorage только в этом браузере.
    // dictionary.js от этого не меняется.

    function resetProgress() {
      const answer = confirm("Сбросить прогресс, текущий урок и личные слова в этом браузере?");

      if (!answer) {
        return;
      }

      localStorage.removeItem(PROGRESS_KEY);
      localStorage.removeItem(CUSTOM_WORDS_KEY);
      localStorage.removeItem(LESSON_KEY);

      progress = {};
      customWords = [];
      lesson = null;

      currentCardIndex = 0;
      currentWritingIndex = 0;
      currentSentenceIndex = 0;
      chosenSentenceWords = [];
      cardAnswerVisible = false;

      renderAll();
    }

    // Первый запуск приложения после загрузки страницы.
    renderAll();
  </script>
</body>
</html>
